- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    course: "DevOps with Ansible"
    myIp: "192.23.89.123"
    tagsMap:
      name: ansible
      project: roboshop
      component: catalogue
    tagsList: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]
  tasks: 
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi Manoj Mantha, {{ GREETING }}"