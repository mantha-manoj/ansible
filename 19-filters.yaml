- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    course: "DevOps with Ansible"
    myIp: "192.23.89.123.32"
    tagsMap:
      name: ansible
      project: roboshop
      component: catalogue
    tagsList: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]
  tasks: 
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi Manoj Mantha, {{ GREETING | default('Good Morning') }}"
  
  - name: Convert string to List
    ansible.builtin.debug:
      msg: "{{ topics | split(', ') }}"

  - name: Convert map to List
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: Convert list to map
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict }}"

  - name: read students yaml
    ansible.builtin.set_fact:
      student_yaml: "{{ lookup('file', 'students.yaml') | from_yaml }}"

  - name: Convert yaml to json
    ansible.builtin.debug:
      msg: "{{ student_yaml | to_nice_json }}"

  - name: Convert to upper case
    ansible.builtin.debug:
      msg: "{{ course | upper }}"

  - name: Convert to lower case
    ansible.builtin.debug:
      msg: "{{ course | lower }}"

  - name: check ipv4
    ansible.builtin.debug:
      msg: "{{ myIp | ansible.utils.ipv4 }}"