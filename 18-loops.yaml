- name: Install packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install package
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - {name: nginx, state: absent}
    - {name: zip, state: present}
    - {name: mysql, state: absent}